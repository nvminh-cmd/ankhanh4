<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Ghi âm - MTTQ Phường An Khánh</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --mttq-blue: #004a8c;
            --mttq-red: #d42020;
            --mttq-gold: #ffc107;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #e9ecef;
            padding: 30px;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 50px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.15);
            border-top: 6px solid var(--mttq-red);
        }

        .header-unit {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-unit h1 {
            margin: 5px 0;
            font-size: 22px;
            color: var(--mttq-blue);
            text-transform: uppercase;
        }

        .line-separator {
            width: 150px;
            height: 2px;
            background-color: var(--mttq-blue);
            margin: 10px auto;
        }

        /* Khu vực điều khiển */
        .control-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px dashed #ccc;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .upload-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            text-align: center;
        }

        button {
            font-family: 'Times New Roman', serif;
            font-size: 15px;
            font-weight: bold;
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .btn-start { background-color: var(--mttq-red); color: white; }
        .btn-stop { background-color: #495057; color: white; display: none; }
        .btn-word { background-color: #2b579a; color: white; }
        .btn-upload { background-color: #28a745; color: white; }

        input[type="file"] {
            font-family: 'Times New Roman', serif;
            margin-bottom: 10px;
        }

        #status-indicator {
            text-align: center;
            height: 30px;
            color: var(--mttq-red);
            font-weight: bold;
        }

        #transcript-editor {
            width: 100%;
            min-height: 400px;
            border: 1px solid #adb5bd;
            padding: 25px;
            font-size: 14pt;
            line-height: 1.6;
            box-sizing: border-box;
            text-align: justify;
            outline: none;
            background: #fff;
        }

        /* Audio ẩn để xử lý file */
        #audio-player { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-unit">
        <h2>ỦY BAN TRUNG ƯƠNG MTTQ VIỆT NAM</h2>
        <h1>ỦY BAN MẶT TRẬN TỔ QUỐC VIỆT NAM<br>PHƯỜNG AN KHÁNH</h1>
        <div class="line-separator"></div>
    </div>

    <div class="control-panel">
        <div class="button-group">
            <button id="startBtn" class="btn-start" onclick="startRecording()">BẮT ĐẦU GHI TRỰC TIẾP</button>
            <button id="stopBtn" class="btn-stop" onclick="stopRecording()">DỪNG LẠI</button>
            <button class="btn-word" onclick="exportWord()">XUẤT FILE WORD (.DOCX)</button>
        </div>

        <div class="upload-section">
            <p style="margin-bottom: 10px; font-weight: bold; color: var(--mttq-blue);">CHUYỂN FILE ÂM THANH CÓ SẴN (.mp3, .wav)</p>
            <input type="file" id="audio-file" accept="audio/*">
            <button class="btn-upload" onclick="processAudioFile()">XỬ LÝ FILE</button>
        </div>
    </div>

    <div id="status-indicator"></div>

    <audio id="audio-player" controls></audio>
    
    <div id="transcript-editor" contenteditable="true">
        (Nội dung văn bản sẽ xuất hiện tại đây...)
    </div>

    <div style="font-size: 12px; color: grey; text-align: center; margin-top: 20px;">
        * Lưu ý: Khi xử lý file, hãy đảm bảo âm lượng máy tính vừa đủ để trình duyệt có thể "nghe" thấy.
    </div>
</div>

<script>
    let recognition;
    const editor = document.getElementById('transcript-editor');
    const status = document.getElementById('status-indicator');

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'vi-VN';

        recognition.onresult = (event) => {
            let resultText = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    resultText += event.results[i][0].transcript + '. ';
                }
            }
            if (resultText) {
                if(editor.innerText.includes("(Nội dung")) editor.innerText = "";
                editor.innerText += resultText.charAt(0).toUpperCase() + resultText.slice(1);
            }
        };
    }

    function startRecording() {
        recognition.start();
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
        status.innerText = "🔴 HỆ THỐNG ĐANG NGHE TRỰC TIẾP...";
    }

    function stopRecording() {
        recognition.stop();
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
        status.innerText = "";
        const player = document.getElementById('audio-player');
        player.pause();
    }

    // Xử lý File Âm Thanh
    function processAudioFile() {
        const fileInput = document.getElementById('audio-file');
        const player = document.getElementById('audio-player');

        if (fileInput.files.length === 0) {
            alert("Vui lòng chọn một file âm thanh trước.");
            return;
        }

        const file = fileInput.files[0];
        const url = URL.createObjectURL(file);
        player.src = url;

        // Bắt đầu nhận diện và phát file
        if(editor.innerText.includes("(Nội dung")) editor.innerText = "";
        status.innerText = "🔴 ĐANG XỬ LÝ DỮ LIỆU TỪ FILE...";
        
        recognition.start();
        player.play();

        player.onended = () => {
            stopRecording();
            status.innerText = "✅ ĐÃ XỬ LÝ XONG FILE.";
        };
    }

    async function exportWord() {
        const content = editor.innerText;
        const { Document, Packer, Paragraph, TextRun, AlignmentType } = docx;

        const doc = new Document({
            sections: [{
                children: [
                    new Paragraph({
                        alignment: AlignmentType.CENTER,
                        children: [
                            new TextRun({
                                text: "ỦY BAN MẶT TRẬN TỔ QUỐC VIỆT NAM PHƯỜNG AN KHÁNH",
                                bold: true,
                                font: "Times New Roman",
                                size: 28,
                            }),
                        ],
                    }),
                    new Paragraph({ text: "", spacing: { after: 200 } }),
                    new Paragraph({
                        children: [
                            new TextRun({
                                text: content,
                                font: "Times New Roman",
                                size: 28,
                            }),
                        ],
                    }),
                ],
            }],
        });

        const blob = await Packer.toBlob(doc);
        saveAs(blob, "Bien_ban_An_Khanh.docx");
    }
</script>

</body>
</html>
